services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leads
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leads"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/leads?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npm run start"

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/leads?schema=public
      WORKER_POLL_MS: "2000"
      WORKER_LOCK_TTL_MS: "120000"
      WORKER_MAX_ATTEMPTS: "5"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npm run worker"
